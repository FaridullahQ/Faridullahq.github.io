<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
    {% seo %}
  </head>
  <body>
    {% include header.html %}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer custom-footer">
      <div class="wrapper footer-grid">
        <div>
          <h3>{{ site.title }}</h3>
          <p>{{ site.description }}</p>
        </div>
        <div>
          <h4>Explore</h4>
          <ul class="footer-links">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/about/' | relative_url }}">About</a></li>
            <li><a href="{{ '/labs/' | relative_url }}">Labs</a></li>
            <li><a href="{{ '/archive/' | relative_url }}">Archive</a></li>
          </ul>
        </div>
        <div>
          <h4>Focus</h4>
          <p>SOC analyst preparation, networking, Linux, SIEM, incident response, and portfolio-based learning.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
